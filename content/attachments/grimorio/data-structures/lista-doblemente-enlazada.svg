<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  width="684"
  height="120"
  viewBox="0 0 684 120"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="8"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F5E6A"/>
    </marker>

    <style>
      .line {
        fill: none;
        stroke: #4F5E6A;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .dot {
        fill: #4F5E6A;
        stroke: none;
      }

      .txt {
        fill: #4F5E6A;
        stroke: none;
        font-family: FreeSans;
        font-size: 25px;
        letter-spacing: 0.3px;
      }

      .txt-bold {
        fill: #4F5E6A;
        stroke: none;
        font-family: FreeSans;
        font-size: 15px;
        letter-spacing: 0.3px;
        font-weight: 700;
      }
    </style>
  </defs>

  <!-- Nodos -->
  <g class="line">

    <!-- Nodo 1 -->
    <rect x="78" y="24" width="105" height="34"/>
    <line x1="96" y1="24" x2="96" y2="58"/>
    <line x1="163" y1="24" x2="163" y2="58"/>
    <circle class="dot" cx="87" cy="41" r="3.2"/>
    <circle class="dot" cx="173" cy="49" r="3.2"/>

    <!-- Nodo 2 -->
    <rect x="209" y="24" width="105" height="34"/>
    <line x1="227" y1="24" x2="227" y2="58"/>
    <line x1="294" y1="24" x2="294" y2="58"/>
    <circle class="dot" cx="218" cy="33" r="3.2"/>
    <circle class="dot" cx="304" cy="49" r="3.2"/>

    <!-- Nodo 3 -->
    <rect x="340" y="24" width="105" height="34"/>
    <line x1="358" y1="24" x2="358" y2="58"/>
    <line x1="425" y1="24" x2="425" y2="58"/>
    <circle class="dot" cx="349" cy="33" r="3.2"/>
    <circle class="dot" cx="435" cy="49" r="3.2"/>

    <!-- Nodo 4 -->
    <rect x="471" y="24" width="105" height="34"/>
    <line x1="489" y1="24" x2="489" y2="58"/>
    <line x1="556" y1="24" x2="556" y2="58"/>
    <circle class="dot" cx="480" cy="33" r="3.2"/>
    <circle class="dot" cx="566" cy="41" r="3.2"/>

    <!-- Conexiones 1 <-> 2 -->
    <line x1="218" y1="33" x2="173" y2="33" marker-end="url(#arrow)"/>
    <line x1="173" y1="49" x2="218" y2="49" marker-end="url(#arrow)"/>

    <!-- Conexiones 2 <-> 3 -->
    <line x1="349" y1="33" x2="304" y2="33" marker-end="url(#arrow)"/>
    <line x1="304" y1="49" x2="349" y2="49" marker-end="url(#arrow)"/>

    <!-- Conexiones 3 <-> 4 -->
    <line x1="480" y1="33" x2="435" y2="33" marker-end="url(#arrow)"/>
    <line x1="435" y1="49" x2="480" y2="49" marker-end="url(#arrow)"/>

    <!-- null izquierda -->
    <line x1="87" y1="41" x2="52" y2="41" marker-end="url(#arrow)"/>

    <!-- null derecha -->
    <line x1="566" y1="41" x2="602" y2="41" marker-end="url(#arrow)"/>
  </g>

  <!-- Textos -->
  <g>
    <text class="txt-bold" x="15" y="45">null</text>
    <text class="txt-bold" x="615" y="45">null</text>

    <text class="txt-bold" x="111" y="46">Dato</text>
    <text class="txt-bold" x="242" y="46">Dato</text>
    <text class="txt-bold" x="373" y="46">Dato</text>
    <text class="txt-bold" x="504" y="46">Dato</text>
  </g>
</svg>