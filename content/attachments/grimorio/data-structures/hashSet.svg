<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" font-family="'Courier New', monospace">
  <defs>
    <style>
      .slot { stroke: #374151; stroke-width: 1.5; rx: 4; }
      .empty { fill: #f3f4f6; }
      .occupied { fill: #dbeafe; }
      .idx { font-size: 11px; fill: #6b7280; text-anchor: middle; }
      .val { font-size: 13px; fill: #1e40af; text-anchor: middle; font-weight: 600; }
      .lbl { font-size: 11px; fill: #9ca3af; text-anchor: middle; }
      .arrow { stroke: #93c5fd; stroke-width: 1.2; fill: none; marker-end: url(#ah); }
      .hash { font-size: 10px; fill: #6b7280; text-anchor: middle; font-style: italic; }
    </style>
    <marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#93c5fd"/>
    </marker>
  </defs>

  <!-- Index labels -->
  <g>
    <text class="idx" x="50" y="20">[0]</text>
    <text class="idx" x="140" y="20">[1]</text>
    <text class="idx" x="230" y="20">[2]</text>
    <text class="idx" x="320" y="20">[3]</text>
    <text class="idx" x="410" y="20">[4]</text>
    <text class="idx" x="500" y="20">[5]</text>
    <text class="idx" x="590" y="20">[6]</text>
    <text class="idx" x="680" y="20">[7]</text>
  </g>

  <!-- Slots -->
  <g>
    <rect class="slot empty"    x="15"  y="30" width="70" height="44"/>
    <rect class="slot occupied" x="105" y="30" width="70" height="44"/>
    <rect class="slot empty"    x="195" y="30" width="70" height="44"/>
    <rect class="slot occupied" x="285" y="30" width="70" height="44"/>
    <rect class="slot empty"    x="375" y="30" width="70" height="44"/>
    <rect class="slot occupied" x="465" y="30" width="70" height="44"/>
    <rect class="slot empty"    x="555" y="30" width="70" height="44"/>
    <rect class="slot occupied" x="645" y="30" width="70" height="44"/>
  </g>

  <!-- Slot content -->
  <g>
    <text class="lbl" x="50"  y="57">vacío</text>
    <text class="val" x="140" y="57">"ab"</text>
    <text class="lbl" x="230" y="57">vacío</text>
    <text class="val" x="320" y="57">"xy"</text>
    <text class="lbl" x="410" y="57">vacío</text>
    <text class="val" x="500" y="57">"cd"</text>
    <text class="lbl" x="590" y="57">vacío</text>
    <text class="val" x="680" y="57">"hi"</text>
  </g>

  <!-- Hash function labels -->
  <g>
    <text class="hash" x="140" y="100">h("ab")%8 = 1</text>
    <path class="arrow" d="M140,88 L140,76"/>

    <text class="hash" x="320" y="100">h("xy")%8 = 3</text>
    <path class="arrow" d="M320,88 L320,76"/>

    <text class="hash" x="500" y="100">h("cd")%8 = 5</text>
    <path class="arrow" d="M500,88 L500,76"/>

    <text class="hash" x="680" y="100">h("hi")%8 = 7</text>
    <path class="arrow" d="M680,88 L680,76"/>
  </g>
</svg>
