<svg width="600" height="110" viewBox="0 0 600 110" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Courier New', Courier, monospace; }
    .label { font-size: 13px; fill: #555555; }
    .cell  { fill: #f5f7fa; stroke: #9baec8; stroke-width: 1.5; }
    .char  { font-size: 24px; font-weight: 700; fill: #1a1a2e; }
    .idx   { font-size: 12px; fill: #777777; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #aaaaaa; }
      .cell  { fill: #1e2330; stroke: #4a6fa5; }
      .char  { fill: #e2e8f0; }
      .idx   { fill: #8899aa; }
    }
  </style>

  <text x="8" y="14" text-anchor="start" class="label">En memoria:</text>

  <rect x="148" y="24" width="96" height="56" rx="6" class="cell"/>
  <text x="196" y="63" text-anchor="middle" class="char">h</text>

  <rect x="252" y="24" width="96" height="56" rx="6" class="cell"/>
  <text x="300" y="63" text-anchor="middle" class="char">o</text>

  <rect x="356" y="24" width="96" height="56" rx="6" class="cell"/>
  <text x="404" y="63" text-anchor="middle" class="char">l</text>

  <rect x="460" y="24" width="96" height="56" rx="6" class="cell"/>
  <text x="508" y="63" text-anchor="middle" class="char">a</text>

  <text x="196" y="97" text-anchor="middle" class="idx">0</text>
  <text x="300" y="97" text-anchor="middle" class="idx">1</text>
  <text x="404" y="97" text-anchor="middle" class="idx">2</text>
  <text x="508" y="97" text-anchor="middle" class="idx">3</text>
</svg>
