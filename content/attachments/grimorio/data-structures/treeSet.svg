<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="'Courier New', monospace">
  <defs>
    <style>
      .edge { stroke: #999; stroke-width: 1.5; fill: none; }
      .node { fill: #f5f5f5; stroke: #666; stroke-width: 1.5; }
      .ntxt { font-size: 14px; fill: #333; text-anchor: middle; font-weight: 700; dominant-baseline: central; }
    </style>
  </defs>

  <!-- Edges -->
  <g class="edge">
    <line x1="240" y1="50"  x2="140" y2="110"/>
    <line x1="240" y1="50"  x2="340" y2="110"/>
    <line x1="140" y1="110" x2="80"  y2="180"/>
    <line x1="140" y1="110" x2="200" y2="180"/>
    <line x1="340" y1="110" x2="280" y2="180"/>
    <line x1="340" y1="110" x2="400" y2="180"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle class="node" cx="240" cy="50" r="24"/>
    <text class="ntxt" x="240" y="50">30</text>

    <circle class="node" cx="140" cy="110" r="24"/>
    <text class="ntxt" x="140" y="110">15</text>

    <circle class="node" cx="340" cy="110" r="24"/>
    <text class="ntxt" x="340" y="110">50</text>

    <circle class="node" cx="80"  cy="180" r="24"/>
    <text class="ntxt" x="80"  y="180">10</text>

    <circle class="node" cx="200" cy="180" r="24"/>
    <text class="ntxt" x="200" y="180">20</text>

    <circle class="node" cx="280" cy="180" r="24"/>
    <text class="ntxt" x="280" y="180">40</text>

    <circle class="node" cx="400" cy="180" r="24"/>
    <text class="ntxt" x="400" y="180">60</text>
  </g>
</svg>
