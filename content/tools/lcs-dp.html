<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCS — Subsecuencia Común más Larga</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

  <style>
    .dp-cell { cursor: pointer; transition: background-color .15s; min-width: 56px; }
    .dp-cell:hover { background-color: #e9ecef !important; }
    .cell-selected  { background-color: #d1e7dd !important; outline: 2px solid #198754; }
    .cell-dep-match { background-color: #fff3cd !important; outline: 2px solid #ffc107; }
    .cell-dep-up    { background-color: #cfe2ff !important; outline: 2px solid #0d6efd; }
    .cell-dep-left  { background-color: #f8d7da !important; outline: 2px solid #dc3545; }
    .lcs-char-match { background-color: #d1e7dd; }
    .lcs-char       { display: inline-block; width: 28px; height: 28px; line-height: 28px;
                      text-align: center; border: 1px solid #dee2e6; border-radius: 4px;
                      font-family: monospace; font-weight: bold; }
  </style>
</head>
<body class="bg-light">
<div id="app">

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h5">🔤 LCS — Subsecuencia Común más Larga</span>
    <span class="badge bg-secondary">DP · O(m·n)</span>
  </nav>

  <div class="container-fluid py-3">
    <div class="row g-3">

      <!-- PANEL IZQUIERDO -->
      <div class="col-12 col-md-4 col-xl-3">

        <div class="card mb-3">
          <div class="card-header fw-semibold">Cadenas de entrada</div>
          <div class="card-body">
            <label class="form-label small">Cadena A</label>
            <input class="form-control mb-2" v-model="strA" placeholder="ej: ABCBDAB" style="font-family:monospace" />
            <label class="form-label small">Cadena B</label>
            <input class="form-control" v-model="strB" placeholder="ej: BDCAB" style="font-family:monospace" />
          </div>
        </div>

        <button class="btn btn-dark w-100 mb-3" @click="solve">▶ Resolver</button>

        <div class="card" v-if="dpTable.length">
          <div class="card-header fw-semibold">Leyenda</div>
          <ul class="list-group list-group-flush small">
            <li class="list-group-item d-flex align-items-center gap-2">
              <span class="badge bg-success">&nbsp;&nbsp;</span> Celda seleccionada
            </li>
            <li class="list-group-item d-flex align-items-center gap-2">
              <span class="badge bg-warning text-dark">&nbsp;&nbsp;</span> Diagonal (coincidencia)
            </li>
            <li class="list-group-item d-flex align-items-center gap-2">
              <span class="badge bg-primary">&nbsp;&nbsp;</span> Arriba (sin A[i])
            </li>
            <li class="list-group-item d-flex align-items-center gap-2">
              <span class="badge bg-danger">&nbsp;&nbsp;</span> Izquierda (sin B[j])
            </li>
          </ul>
        </div>

        <div class="div mt-4 mb-4">
          <p class="signature"> Hecho con ❤️ por <a href="https://www.sipofcode.com">Lucas</a> (y <a href="https://claude.ai">Claude</a>)</p>
        </div>

      </div>

      <!-- PANEL DERECHO -->
      <div class="col-12 col-md-8 col-xl-9">

        <div class="card" v-if="!dpTable.length">
          <div class="card-body text-center text-muted py-5">
            <div class="fs-1">🔤</div>
            <p class="mt-2">Ingresa dos cadenas y pulsa <strong>Resolver</strong>.</p>
          </div>
        </div>

        <template v-else>

          <!-- Banner -->
          <div class="card mb-3 border-success">
            <div class="card-body d-flex flex-wrap align-items-center gap-4">
              <div>
                <div class="text-muted small">Longitud LCS</div>
                <div class="fs-3 fw-bold text-success">{{ lcsLength }}</div>
              </div>
              <div>
                <div class="text-muted small mb-1">LCS encontrada</div>
                <div>
                  <span v-for="ch in lcsString" :key="ch.idx"
                    class="lcs-char me-1"
                    :class="'lcs-char-match'">{{ ch.c }}</span>
                </div>
              </div>
              <div>
                <div class="text-muted small">Cadenas</div>
                <div class="font-monospace">
                  <span class="badge bg-light text-dark border me-1">A: {{ strA }}</span>
                  <span class="badge bg-light text-dark border">B: {{ strB }}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Tabla DP -->
          <div class="card mb-3">
            <div class="card-header fw-semibold">Tabla de Programación Dinámica</div>
            <div class="card-body p-2 overflow-auto">
              <table class="table table-bordered table-sm text-center align-middle mb-0">
                <thead class="table-dark">
                  <tr>
                    <th></th>
                    <th class="table-secondary text-dark">ε</th>
                    <th v-for="(ch, j) in strB" :key="j" class="table-secondary text-dark" style="font-family:monospace">
                      {{ ch }}<br><small class="text-muted">j={{ j+1 }}</small>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(row, i) in dpTable" :key="i">
                    <th class="table-secondary text-start" style="font-family:monospace">
                      <span v-if="i === 0" class="text-muted">ε</span>
                      <span v-else>{{ strA[i-1] }}<br><small class="text-muted">i={{ i }}</small></span>
                    </th>
                    <td
                      v-for="(cell, j) in row" :key="j"
                      class="dp-cell"
                      :class="cellClass(i, j)"
                      @click="selectCell(i, j)"
                    >
                      <div class="fw-bold">{{ cell }}</div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Explicación -->
          <div class="card">
            <div class="card-header fw-semibold">🔍 Explicación paso a paso</div>
            <div class="card-body">
              <p class="text-muted text-center py-3 mb-0" v-if="!selected">
                Haz clic en cualquier celda de la tabla para ver cómo se calculó ese valor.
              </p>
              <div class="row g-3" v-else>
                <div class="col-12 col-lg-6">
                  <p class="fw-semibold small text-muted text-uppercase mb-1">Fórmula de recurrencia</p>
                  <div class="border rounded p-3 bg-white" id="formula-box"></div>
                  <div class="mt-2">
                    <span :class="['badge', 'fs-6', verdictBadge]">{{ verdictIcon }} {{ verdictText }}</span>
                  </div>
                </div>
                <div class="col-12 col-lg-6">
                  <p class="fw-semibold small text-muted text-uppercase mb-1">Sustitución de valores</p>
                  <div class="border rounded p-3 bg-white" id="subst-box"></div>
                </div>
              </div>
            </div>
          </div>

        </template>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref, computed, nextTick } = Vue;

createApp({
  setup() {
    const strA = ref('ABCBDAB');
    const strB = ref('BDCAB');

    const dpTable  = ref([]);
    const selected = ref(null);

    // ── DP ──
    function solve() {
      selected.value = null;
      const A = strA.value, B = strB.value;
      const m = A.length, n = B.length;
      if (!m || !n) return;

      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = A[i-1] === B[j-1]
            ? dp[i-1][j-1] + 1
            : Math.max(dp[i-1][j], dp[i][j-1]);

      dpTable.value = dp;
    }

    // ── LCS backtrack ──
    const lcsLength = computed(() => {
      const t = dpTable.value;
      if (!t.length) return 0;
      return t[t.length - 1][t[0].length - 1];
    });

    const lcsString = computed(() => {
      const t = dpTable.value;
      const A = strA.value, B = strB.value;
      if (!t.length) return [];
      const result = [];
      let i = A.length, j = B.length, idx = 0;
      while (i > 0 && j > 0) {
        if (A[i-1] === B[j-1]) { result.unshift({ c: A[i-1], idx: idx++ }); i--; j--; }
        else if (t[i-1][j] > t[i][j-1]) i--;
        else j--;
      }
      return result;
    });

    // ── Celdas ──
    function cellClass(i, j) {
      if (!selected.value) return '';
      const { si, sj } = selected.value;
      if (i === si && j === sj)       return 'cell-selected';
      if (i === si-1 && j === sj-1)   return 'cell-dep-match';
      if (i === si-1 && j === sj)     return 'cell-dep-up';
      if (i === si   && j === sj-1)   return 'cell-dep-left';
      return '';
    }

    function selectCell(i, j) {
      selected.value = { si: i, sj: j };
      nextTick(() => renderExplanation(i, j));
    }

    function renderExplanation(i, j) {
      const A = strA.value, B = strB.value;
      const t = dpTable.value;
      const isBase = i === 0 || j === 0;
      const cellVal = t[i][j];

      const fBox = document.getElementById('formula-box');
      if (fBox) {
        fBox.innerHTML = '';
        const desc = document.createElement('div');
        desc.className = 'small text-muted mb-2';
        desc.textContent = isBase
          ? `Fila i=${i}, Columna j=${j} — caso base (cadena vacía)`
          : `A[${i}]="${A[i-1]}", B[${j}]="${B[j-1]}" — i=${i}, j=${j}`;
        fBox.appendChild(desc);

        const math = document.createElement('div');
        if (isBase) {
          katex.render(`dp[${i}][${j}] = 0 \\quad \\text{(caso base)}`, math, { displayMode: true, throwOnError: false });
        } else {
          katex.render(
            `dp[i][j] = \\begin{cases} dp[i-1][j-1] + 1 & \\text{si } A[i] = B[j] \\\\ \\max(dp[i-1][j],\\ dp[i][j-1]) & \\text{si } A[i] \\neq B[j] \\end{cases}`,
            math, { displayMode: true, throwOnError: false }
          );
        }
        fBox.appendChild(math);
      }

      const sBox = document.getElementById('subst-box');
      if (sBox) {
        sBox.innerHTML = '';
        if (isBase) {
          const p = document.createElement('div');
          p.className = 'text-muted small';
          p.textContent = 'Caso base: cuando alguna cadena está vacía, la LCS tiene longitud 0.';
          sBox.appendChild(p);
          return;
        }
        const match = A[i-1] === B[j-1];
        const diag  = t[i-1][j-1];
        const up    = t[i-1][j];
        const left  = t[i][j-1];

        const desc = document.createElement('div');
        desc.className = 'small text-muted mb-2';
        desc.textContent = `A[${i}] = "${A[i-1]}", B[${j}] = "${B[j-1]}" → ${match ? '¡Coinciden!' : 'No coinciden'}`;
        sBox.appendChild(desc);

        const line1 = document.createElement('div'); line1.className = 'mb-1';
        const line2 = document.createElement('div'); line2.className = 'mb-1';
        const line3 = document.createElement('div'); line3.className = 'mb-1';
        const hr = document.createElement('hr'); hr.className = 'my-2';
        const result = document.createElement('div');

        if (match) {
          katex.render(`dp[${i-1}][${j-1}] + 1 = ${diag} + 1 = \\mathbf{${diag+1}}`, line1, { throwOnError: false });
          sBox.appendChild(line1);
        } else {
          katex.render(`\\text{Arriba: } dp[${i-1}][${j}] = ${up}`, line1, { throwOnError: false });
          katex.render(`\\text{Izquierda: } dp[${i}][${j-1}] = ${left}`, line2, { throwOnError: false });
          sBox.appendChild(line1);
          sBox.appendChild(line2);
        }
        sBox.appendChild(hr);
        katex.render(`dp[${i}][${j}] = \\mathbf{${cellVal}}`, result, { throwOnError: false });
        sBox.appendChild(result);
      }
    }

    const verdictBadge = computed(() => {
      if (!selected.value) return 'bg-secondary';
      const { si, sj } = selected.value;
      if (si === 0 || sj === 0) return 'bg-secondary';
      return strA.value[si-1] === strB.value[sj-1] ? 'bg-warning text-dark' : 'bg-primary';
    });
    const verdictIcon = computed(() => {
      if (!selected.value) return '';
      const { si, sj } = selected.value;
      if (si === 0 || sj === 0) return '⬜';
      return strA.value[si-1] === strB.value[sj-1] ? '✅' : '↕';
    });
    const verdictText = computed(() => {
      if (!selected.value) return '';
      const { si, sj } = selected.value;
      if (si === 0 || sj === 0) return 'Caso base';
      const match = strA.value[si-1] === strB.value[sj-1];
      return match
        ? `"${strA.value[si-1]}" coincide → diagonal + 1`
        : `No coinciden → max(arriba, izquierda)`;
    });

    nextTick(solve);

    return {
      strA, strB, dpTable, selected,
      lcsLength, lcsString,
      solve, selectCell, cellClass,
      verdictBadge, verdictIcon, verdictText,
    };
  }
}).mount('#app');
</script>
</body>
</html>
